<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Combat du Boss</title>

<style>
body{
    font-family: Arial;
    background:#222;
    color:white;
    text-align:center;
    overflow:hidden;
    margin:0;
}

h1,h2 {margin:5px 0;}

#bossImage{
    width:250px;
    height:250px;
    object-fit:cover;
    border:3px solid gold;
    border-radius:15px;
    margin:20px auto;
    display:block;
    transition: filter 0.5s, transform 0.2s, box-shadow 0.2s;
}

button{
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
    border-radius:5px;
    border:none;
    font-size:16px;
    transition: transform 0.2s, background 0.2s;
}
button:hover{transform: scale(1.1);}

#heartsContainer{font-size:40px;margin:10px 0;}
#statusContainer{font-size:22px;margin-bottom:15px;}

#thinkingIcon{
    position:fixed;
    top:10px;
    right:10px;
    font-size:30px;
    display:none;
}


#studentPopup{
    display:none;
    position:fixed;

    top:50%;
    left:50%;
    transform:translate(-50%, -50%);

    background:#111;
    padding:20px;
    border-radius:15px;
    border:2px solid gold;

    z-index:5000;

    width:90%;
    max-width:300px;

    max-height:80vh;
    overflow-y:auto;

    box-shadow:0 0 20px black;
}

#studentPopup img{
    width:100%;
    max-width:180px;
    height:auto;
    object-fit:cover;
    border-radius:10px;
}


#manaShop{
    display:none;
    position:fixed;
    top:60%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#000;
    padding:20px;
    border-radius:15px;
    border:2px solid cyan;
    z-index:6000;
    width:280px;
}

#fightDiv{
    padding-bottom:320px;
}

    #overlay{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.7);
    z-index:4000;
}

@media(max-width:500px){
    #bossImage{width:180px;height:180px;}
    button{font-size:14px;padding:8px 16px;}
}
    @keyframes shake {
    0% { transform: translate(0px, 0px); }
    20% { transform: translate(-5px, 3px); }
    40% { transform: translate(5px, -3px); }
    60% { transform: translate(-5px, 2px); }
    80% { transform: translate(5px, -2px); }
    100% { transform: translate(0px, 0px); }
}

.shake {
    animation: shake 0.3s;
}
    .hit {
    filter: brightness(2) saturate(2) hue-rotate(-20deg);
}
</style>
</head>

<body>

<h1>Combat du Boss</h1>

<div id="setupDiv">
<h2>Préparez le Boss</h2>

<label>❤️ Vies: <input type="number" id="bossHearts" value="3"></label><br><br>
<label>XP Récompense: <input type="number" id="bossXP" value="150"></label><br><br>
<label>💰 Or Récompense: <input type="number" id="bossGold" value="5"></label><br><br>
<label>🔮 Mana Récompense: <input type="number" id="bossMana" value="0"></label><br><br>
<label>Nombre de mauvaises réponses avant la fuite du boss : <input type="number" id="bossEscape" value="3"></label><br><br>

<button onclick="startFight()">Commencer le combat</button>
</div>


<div id="fightDiv" style="display:none;">

<div id="heartsContainer"></div>
<div id="statusContainer"></div>

<img id="bossImage" src="">

<div>
<button id="goodBtn" onclick="goodAnswer()">Bonne réponse ✅</button>
<button id="wrongBtn" onclick="wrongAnswer()">Mauvaise réponse ❌</button>

<br>

<button onclick="showRandomStudent()">🎲 Élève au hasard</button>
</div>

</div>

<div id="thinkingIcon">💭</div>
<div id="overlay" onclick="closePopup()"></div>

<div id="studentPopup">
    <img id="popupImg">
    <h3 id="popupName"></h3>
    <div id="popupStats"></div>

    <button onclick="openManaShop()">🔮 Utiliser du mana</button>
    <button onclick="changeMana(-1)">➖ Mana -1</button>
    <button onclick="closePopup()">Fermer</button>
</div>


<div id="manaShop">
    <h3>🧙 Sorts</h3>
    <div id="spellContainer"></div>
    <button onclick="closeManaShop()">Fermer</button>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let className = params.get("name") || "Classe";

let students = JSON.parse(localStorage.getItem("class_" + className)) || [];
let spells = JSON.parse(localStorage.getItem(className + "_spells")) || [];

let boss = {hearts:3,xp:150,gold:5,mana:0,escape:3};
let wrongCount = 0;
let currentStudent = null;
let fightEnded = false;

function shakeBoss(){
    const bossImg = document.getElementById("bossImage");

    bossImg.classList.add("shake", "hit");

    setTimeout(()=>{
        bossImg.classList.remove("shake", "hit");
    }, 300);
}

function startFight(){

    let randomIndex = Math.floor(Math.random()*20)+1;
    document.getElementById("bossImage").src = "boss"+randomIndex+".png";

    boss.hearts = parseInt(bossHearts.value)||3;
    boss.xp = parseInt(bossXP.value)||150;
    boss.gold = parseInt(bossGold.value)||5;
    boss.mana = parseInt(bossMana.value)||0;
    boss.escape = parseInt(bossEscape.value)||3;

    wrongCount = 0;
    fightEnded = false;

    document.getElementById("setupDiv").style.display="none";
    document.getElementById("fightDiv").style.display="block";

    updateBoss();
}



function updateBoss(){
    let c = document.getElementById("heartsContainer");
    c.innerHTML = "";
    for(let i=0;i<boss.hearts;i++) c.innerHTML += "❤️";
}



function showRandomStudent(){

    let alive = students.filter(s => (s.hearts || 0) > 0);

    if(alive.length === 0){
        alert("Aucun élève vivant !");
        return;
    }

    let s = alive[Math.floor(Math.random()*alive.length)];
    currentStudent = s;

    let index = students.indexOf(s);

    document.getElementById("popupImg").src = "student"+(index+1)+".png";
    document.getElementById("popupName").innerText = s.name;

    updatePopup();

    // 🔥 AJOUT ICI
    document.getElementById("overlay").style.display = "block";

    document.getElementById("studentPopup").style.display = "block";
}

function updatePopup(){
    if(!currentStudent) return;

    popupStats.innerHTML =
        "❤️ "+(currentStudent.hearts||0)+"/10<br>"+
        "🪙 "+(currentStudent.gold||0)+"<br>"+
        "🔮 "+(currentStudent.mana||0)+"<br>"+
        "⭐ XP "+(currentStudent.xp||0);
}

function closePopup(){
    document.getElementById("studentPopup").style.display="none";

    // 🔥 AJOUT ICI
    document.getElementById("overlay").style.display="none";
}



function changeMana(v){
    if(!currentStudent) return;
    currentStudent.mana = Math.max(0,(currentStudent.mana||0)+v);
    updatePopup();
}



function openManaShop(){
    manaShop.style.display="block";
    renderSpellsShop();
}

function closeManaShop(){
    manaShop.style.display="none";
}

function renderSpellsShop(){

    let div = spellContainer;
    div.innerHTML = "";

    spells.forEach(spell=>{
        let btn = document.createElement("button");
        btn.innerText = `${spell.name} (${spell.cost})`;
        btn.onclick = () => useSpell(spell);
        div.appendChild(btn);
        div.appendChild(document.createElement("br"));
    });
}

function useSpell(spell){

    if(!currentStudent || fightEnded) return;

    if((currentStudent.mana||0) < spell.cost){
        alert("Pas assez de mana !");
        return;
    }

    currentStudent.mana -= spell.cost;
    boss.hearts -= spell.damage;

    if(boss.hearts < 0) boss.hearts = 0;

    updateBoss();
    updatePopup();
    closeManaShop();

    if(boss.hearts === 0){
        victory();
    }
}



function goodAnswer(){
    if(fightEnded) return;

    boss.hearts--;
    shakeBoss(); 
    updateBoss();

    if(boss.hearts <= 0){
        victory();
    }
}

function wrongAnswer(){
    if(fightEnded) return;

    wrongCount++;
    if(wrongCount >= boss.escape){
        alert("Le boss s'est enfui !");
        endFight();
    }
}



function victory(){

    fightEnded = true;

    let btn = document.createElement("button");
    btn.innerText = "🎁 Récupérer les récompenses";
    btn.onclick = claimRewards;

    statusContainer.innerHTML = "🏆 Boss vaincu !";
    statusContainer.appendChild(document.createElement("br"));
    statusContainer.appendChild(btn);
}

function claimRewards(){

    let alive = students.filter(s => (s.hearts||0) > 0);

    alive.forEach(s=>{
        s.gold = (s.gold||0) + boss.gold;
        s.mana = (s.mana||0) + boss.mana;
        addXP(s, boss.xp);
    });

    localStorage.setItem("class_"+className, JSON.stringify(students));

    alert("Récompenses distribuées !");

   
    window.location.href = "classemagique/class.html?name=" + className;
}

function endFight(){
    fightEnded = true;
}


function addXP(s, amount){

    s.xp = (s.xp||0) + amount;
    if(!s.level) s.level = 1;

    while(s.xp >= 1000){
        s.xp -= 1000;
        s.level++;
    }
}
</script>

</body>
</html>
