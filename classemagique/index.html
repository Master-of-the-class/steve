<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classe Magique</title>

<style>
body{
    font-family:"Trebuchet MS", serif;
    margin:0;
    min-height:100vh;

    background:
        linear-gradient(
            rgba(0,0,0,.15),
            rgba(0,0,0,.15)
        ),
        radial-gradient(
            circle at center,
            #6d5534,
            #3e2e1d
        );

    color:#f7e9c0;
}

/* Top Bar */

.topbar{
    background:
        linear-gradient(
            #4d371f,
            #2d1f10
        );

    border-bottom:3px solid #a88443;

    padding:15px;

    text-align:center;

    font-size:28px;
    font-weight:bold;

    color:#f7e9c0;
}

/* Main Layout */

.main{
    max-width:1200px;
    margin:auto;
    padding:25px;
}

/* Panels */

.panel{
    background:
        linear-gradient(
            180deg,
            rgba(43,29,16,.95),
            rgba(59,42,24,.95)
        );

    border:2px solid #a88443;

    border-radius:18px;

    padding:20px;

    margin-bottom:25px;

    box-shadow:
        0 10px 30px rgba(0,0,0,.35);
}

#classIcon{
    font-size:32px;
    padding:10px;
    width:120px;
    text-align:center;
}

#classIcon option{
    font-size:32px;
}

/* Inputs */

input{
    padding:10px;
    border-radius:8px;
    border:1px solid #a88443;

    background:#1f140c;
    color:#f7e9c0;

    margin:5px;
}

input:focus{
    outline:none;
    border-color:gold;
}

/* Buttons */

button{
    padding:10px 16px;

    border:none;
    border-radius:8px;

    background:#6d4c28;
    color:#f7e9c0;

    font-weight:bold;

    cursor:pointer;

    transition:.2s;
}

button:hover{
    background:#8b5e34;
    transform:translateY(-2px);
}

/* Class Cards */

.classGrid{
    display:grid;

    grid-template-columns:
        repeat(auto-fit,minmax(220px,1fr));

    gap:15px;
}

.classCard{
    background:
        linear-gradient(
            180deg,
            #f5e8c8,
            #e4cf9a
        );

    color:#5a2d00;

    border:2px solid #8b6b3f;

    border-radius:16px;

    padding:20px;

    text-align:center;

    cursor:pointer;

    box-shadow:
        0 4px 12px rgba(0,0,0,.25);

    transition:.2s;
}

.classCard:hover{
    transform:
        translateY(-5px)
        scale(1.03);

    box-shadow:
        0 0 15px rgba(255,215,0,.3),
        0 10px 20px rgba(0,0,0,.35);
}

.className{
    font-size:20px;
    font-weight:bold;
    margin-bottom:10px;
}

.classIcon{
    font-size:48px;
    margin-bottom:10px;
}</style>
</head>
<body>
<div class="topbar">
    🏰 Classe Magique
</div>

<div class="main">

    <div class="panel">
        <h2>✨ Créer une nouvelle classe</h2>

        <input type="text"
       id="className"
       placeholder="Nom de la classe">

<input type="number"
       id="studentCount"
       placeholder="Nombre d'élèves">

<br><br>

<label>Icône de la classe :</label>

<select id="classIcon">

    <option value="🏫">🏫</option>
    <option value="⚔️">⚔️</option>

<option value="👺">👺</option>
<option value="🐉">🐉</option>
<option value="🔥">🔥</option>
<option value="🧙">🧙</option>
<option value="🧝">🧝</option>
<option value="🧟">🧟</option>
<option value="🧛">🧛</option>

<option value="🦇">🦇</option>

<option value="🦂">🦂</option>
<option value="🐍">🐍</option>
<option value="👁️">👁️</option>

<option value="🌙">🌙</option>
<option value="⭐">⭐</option>
<option value="✨">✨</option>

</select>

<br><br>

<button onclick="createClass()">
    ➕ Créer
</button>
    </div>

    <div class="panel">
        <h2>📚 Classes existantes</h2>

        <div id="classList" class="classGrid"></div>
    </div>

    <div class="panel">
        <h2>💾 Sauvegarde</h2>

        <button onclick="exportAllClasses()">
            Exporter toutes les classes
        </button>

        <button onclick="document.getElementById('importClassesFile').click()">
            Importer des classes
        </button>

        <input
            type="file"
            id="importClassesFile"
            style="display:none"
            onchange="importAllClasses(event)">
    </div>

</div>
<script>
function loadClasses(){
    let list = document.getElementById("classList");
    list.innerHTML = "";

    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);

        if (key.startsWith("class_")) {

            let name = key.replace("class_","");

            let raw = localStorage.getItem(key);
            let data = null;

try {
    data = raw ? JSON.parse(raw) : null;
} catch (e) {
    console.error("LocalStorage corrompu pour :", key, raw);
    continue;
}

            let icon = "🏫";
            let students = [];

            if (!data) {
                icon = "🏫";
                students = [];
            }
            else if (Array.isArray(data)) {
                students = data;
            }
            else {
                icon = data.icon || "🏫";
                students = data.students || [];
            }

            list.innerHTML += `
                <div class="classCard"
                     onclick="openClass('${name}')">

                    <div class="classIcon">${icon}</div>

                    <div class="className">${name}</div>

                    <div>${students.length} élèves</div>

                </div>
            `;
        }
    }
}
function createClass(){

    let name = document.getElementById("className").value.trim();
    let count = parseInt(document.getElementById("studentCount").value);
let icon =
    document.getElementById("classIcon").value;
    if(!name || isNaN(count) || count < 1 || count > 50){
        alert("Veuillez saisir un nom valide et un nombre d'élèves entre 1 et 50");
        return;
    }

    let students = [];

    for(let i = 0; i < count; i++){
        students.push({
            name:"Élève " + (i+1),
            hearts:10,
            gold:0,
            mana:5,
            xp:0,
            level:1,
            image:""
        });
    }

   localStorage.setItem(
    "class_"+name,
    JSON.stringify({
        icon: icon,
        students: students
    })
);

    document.getElementById("className").value = "";
    document.getElementById("studentCount").value = "";

    loadClasses();
}
function openClass(name){
    window.location.href =
        "class.html?name=" +
        encodeURIComponent(name);
}
function exportAllClasses(){

    const allClasses = {};

    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);

        if (key.startsWith("class_")) {
            allClasses[key] = localStorage.getItem(key);
        }
    }

    const blob = new Blob(
        [JSON.stringify(allClasses,null,2)],
        {type:"application/json"}
    );

    const link = document.createElement("a");

    link.href = URL.createObjectURL(blob);
    link.download = "toutes_les_classes.json";
    link.click();
}

function importAllClasses(event){

    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = function(e){

        try{

            const imported =
                JSON.parse(e.target.result);

            for(let key in imported){
                localStorage.setItem(
                    key,
                    imported[key]
                );
            }

            loadClasses();

        }catch(err){

            alert(
                "Erreur : " + err
            );
        }
    };

    reader.readAsText(file);
}
loadClasses();
</script>
