<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Classe</title>
<style>
body{
    font-family: "Trebuchet MS", serif;
    margin:0;

    background:
        linear-gradient(
            rgba(0,0,0,.15),
            rgba(0,0,0,.15)
        ),
        radial-gradient(
            circle at center,
            #6d5534,
            #3e2e1d
        );

    overflow:auto;
}

/* Top Bar */
.topbar{
    background:
        linear-gradient(
            #4d371f,
            #2d1f10
        );

    color:#f7e9c0;

    border-bottom:
        3px solid #a88443;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    padding:5px 10px;
    cursor:pointer;
}

/* Responsive Grid */
.container {
    display: grid;
    gap: 10px;
    padding: 10px;
    height: calc(100vh - 60px);
    overflow-y: auto;

    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    max-width: 1200px;
    margin: 0 auto;
}

/* Student Card */
.card{
    background:linear-gradient(
        180deg,
        #f5e8c8,
        #e4cf9a
    );

    border:2px solid #8b6b3f;
    border-radius:14px;
backdrop-filter: blur(2px);
    border-radius: 16px;
    padding:6px;

    display:flex;
    flex-direction:column;

    gap:4px;

    cursor:pointer;
    position:relative;
 position: relative;
    overflow: hidden;
    box-shadow:
        0 4px 12px rgba(0,0,0,.25);

    transition:
        transform .2s,
        box-shadow .2s;
aspect-ratio: 3 / 4;
transition: transform 0.2s ease, box-shadow 0.2s ease;
    min-height:150px;
}

.card:hover {
    transform: translateY(-6px) scale(1.03);

    box-shadow:
        0 0 15px rgba(255, 215, 0, 0.35),
        0 12px 25px rgba(0, 0, 0, 0.4);
}

.card::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255, 215, 0, 0.4),
        transparent
    );
    opacity: 0;
    transition: opacity 0.3s;
}

.card:hover::before {
    opacity: 1;
    animation: shine 1.2s linear infinite;
}

@keyframes shine {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(100%); }
}

.card.selected {
    outline: 3px solid gold;
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
    transform: scale(1.02);
}
.selectBox{
    position:absolute;
    top:8px;
    left:8px;
    transform:scale(1.3);
    cursor:pointer;
}



.studentPortrait{
    width:60px;
    height:60px;
    object-fit:cover;
    border-radius:8px;
    border:2px solid #8b6b3f;
    display:block;
    margin:auto;
}

.stats{
    font-size:clamp(10px,1vw,14px);
    display:flex;
    flex-direction:column;
    gap:4px;
    line-height:1.2;
}

.stats span{
    display:flex;
    gap:2px;
    align-items:center;
    flex-wrap:nowrap;
}

/* Popup + Settings */
.popup, .settings {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    width: 340px;
    max-height: 85vh;
    overflow-y: auto;

    padding: 18px 18px;

    border-radius: 16px;

    background: linear-gradient(
        180deg,
        #2b1d10,
        #3b2a18
    );

    color: #f7e9c0;

    border: 2px solid #a88443;

    box-shadow:
        0 15px 40px rgba(0,0,0,0.6),
        0 0 25px rgba(255, 215, 0, 0.15);

    z-index: 1000;

    animation: popupIn 0.2s ease-out;
}
@keyframes popupIn {
    0% {
        opacity: 0;
        transform: translate(-50%, -48%) scale(0.95);
    }
    100% {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
    }
}

.popup h3 {
    margin-top: 0;
    margin-bottom: 12px;

    font-size: 18px;
    color: #f7e9c0;

    text-align: center;

    text-shadow: 0 0 10px rgba(255, 215, 0, 0.2);
}


.popup input {
    width: 100%;
    padding: 6px 8px;

    margin-top: 4px;
    margin-bottom: 10px;

    border-radius: 8px;
    border: 1px solid #a88443;

    background: #1f140c;
    color: #f7e9c0;

    outline: none;
}


.popup button {
    padding: 6px 10px;
    margin: 3px 2px;

    border: none;
    border-radius: 8px;

    background: #6d4c28;
    color: #f7e9c0;

    cursor: pointer;

    transition: 0.15s;
}


.popup span {
    color: #ffd98a;
    font-weight: bold;
}

.popup button:hover {
    background: #8b5e34;
    transform: translateY(-1px);
}

.popup input:focus {
    border-color: gold;
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
}

.overlay{
    display:none;
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    top:0;
    left:0;
}
.miniBtn{
    padding:0px 6px;
    font-size:11px;
    line-height:1;
    height:18px;
    min-width:18px;
}

.statRow{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:6px;
}	

.studentName{
    font-weight:bold;
    font-size:14px;
    color:#5a2d00;
}

.levelBadge{
    color:#785100;
    font-size:12px;
}

.xpBar{
    height:10px;
    background:#cfc4a0;
    border-radius:20px;
    overflow:hidden;
}

.xpFill{
    height:100%;

    background:
        linear-gradient(
            90deg,
            #3d6df5,
            #8a42ff
        );

    box-shadow:
        0 0 10px #8a42ff;
}

.statsCompact{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:4px;

    text-align:center;

    font-size:14px;
}

.actionBtn{
    width:100%;
    padding:8px;

    border:none;

    border-radius:8px;

    background:#6d4c28;

    color:white;

    font-weight:bold;
}

.card.rare{
    border:3px solid #3498db;
box-shadow: 0 0 10px rgba(52, 152, 219, 0.4);
}

.card.epic{
    border:3px solid #9b59b6;
box-shadow: 0 0 12px rgba(155, 89, 182, 0.5);
}

.card.legendary{
    border:3px solid gold;
 box-shadow:
        0 0 15px rgba(255, 215, 0, 0.6),
        0 0 30px rgba(255, 215, 0, 0.3);
}

.card.legendary::before{
    content:"👑";
    position:absolute;
    top:5px;
    right:8px;
    font-size:20px;
}

@keyframes cardPop {
    0% {
        opacity: 0;
        transform: scale(0.85) translateY(10px);
        filter: blur(4px);
    }
    100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
    }
}

.card.pop {
    animation: cardPop 0.25s ease-out;
}
	
#levelBanner{
    position:fixed;
    top:40%;
    left:50%;
    transform:translate(-50%,-50%);
    background:gold;
    color:black;
    font-size:50px;
    font-weight:bold;
    padding:30px 60px;
    border-radius:20px;
    display:none;
    z-index:2000;
    box-shadow:0 0 40px orange;
}
</style>
</head>
<body>

<div class="topbar">
    <div id="classTitle"></div>
    <div>
		<button onclick="goToBoss()">👹 Combat Boss</button>
        <button onclick="openTools()">🛠 Outils</button>
        <button onclick="openSettings()">⚙ Paramètres</button>
        <button onclick="goBack()">Menu Principal</button>
	</div>
</div>

<div class="container" id="students"></div>

<div class="overlay" id="overlay" onclick="closeAll()"></div>

<!-- Student Popup -->
<div class="popup" id="popup">
    <h3>Modifier l'élève</h3>
    Nom:<br>
    <input type="text" id="studentName"><br><br>
<img id="previewImage"
     style="width:120px;height:120px;object-fit:cover;border-radius:10px;border:1px solid #ccc;"><br><br>

<input type="file" id="studentImage" accept="image/*"><br><br>
    ❤️ Cœurs : <span id="liveHearts"></span><br>
    <button onclick="changeHearts(1)">+</button>
    <button onclick="changeHearts(-1)">-</button>
    <br><br>

    🪙 Or : <span id="liveGold"></span><br>
    <input type="number" id="goldInput">
    <button onclick="changeGold()">Appliquer</button>
    <br><br>

    🔮 Mana : <span id="liveMana"></span><br>
    <button onclick="changeMana(1)">+</button>
    <button onclick="changeMana(-1)">-</button>
    <br><br>

	<br>
	⭐ XP : <span id="liveXP"></span><br>
	<input type="number" id="xpInput" placeholder="Ajouter XP">
	<button onclick="changeXP()">Appliquer</button>
	<br><br>

    <button onclick="saveAndClose()">Enregistrer</button>
</div>

<!-- Settings Menu -->
<div class="settings" id="settingsMenu">
    <h3>Paramètres</h3>
    <button onclick="resetClass()">Réinitialiser la classe</button><br><br>
    <button onclick="deleteClass()">Supprimer la classe</button><br><br>
    <button onclick="closeAll()">Fermer</button>
	<button onclick="renameClass()">✏️ Renommer la classe</button><br><br>
</div>

<!-- Tools Menu -->
<div class="settings" id="toolsMenu">
    <h3>Outils</h3>
    <button onclick="pickRandomStudent()">🎲 Élève au hasard</button>
    <br><br>
    <label>Taille des groupes (2–6) :</label><br>
    <input type="number" id="groupSize" min="2" max="6" value="2">
    <button onclick="makeGroups()">Créer les groupes</button>
    <br><br>
    <label><input type="checkbox" id="muteToggle" onchange="toggleMute()"> Couper le son</label>
    <br><br>
	<label><input type="checkbox" id="noRepeatToggle"> Ne pas répéter avant d'avoir tout choisi</label>
	<br><br>
	<button onclick="resetPicked()">Réinitialiser les élèves choisis</button>
	<br><br>
	<button onclick="openSpellEditor()">🧙 Configurer les sorts</button>
    <button onclick="closeAll()">Fermer</button>
	<br><br>
	<button onclick="exportClass()">💾 Exporter la classe</button><br><br>
	<input type="file" id="importFile" style="display:none" onchange="importClass(event)">
	<button onclick="document.getElementById('importFile').click()">📂 Importer la classe</button>
</div>

<div class="popup" id="bulkPopup">
    <h3>Récompense de groupe</h3>

    ❤️ Cœurs :
    <input type="number" id="bulkHearts" value="0"><br><br>

    🔮 Mana :
    <input type="number" id="bulkMana" value="0"><br><br>

    🪙 Or :
    <input type="number" id="bulkGold" value="0"><br><br>

    ⭐ XP :
    <input type="number" id="bulkXP" value="0"><br><br>

    <button onclick="applyBulkReward()">Appliquer</button>
    <button onclick="closeAll()">Annuler</button>
</div>

<div class="popup" id="groupPopup">
    <h3>Groupes</h3>
    <div id="groupContent" style="max-height:300px;overflow:auto;"></div>
    <br>
    <button onclick="downloadGroups()">Télécharger</button>
    <button onclick="closeAll()">Fermer</button>
</div>

	<div class="popup" id="spellEditor">
    <h3>🧙 Sorts du Boss</h3>

    <div id="spellList"></div>

    <button onclick="addSpell()">➕ Ajouter un sort</button><br><br>
    <button onclick="saveSpells()">💾 Sauvegarder</button>
    <button onclick="closeSpellEditor()">Fermer</button>
</div>

<script>
/* ==================== INITIAL SETUP ==================== */
const params = new URLSearchParams(window.location.search);
let className = params.get("name") || "Default Class";
document.getElementById("classTitle").innerText = className;
let selectedStudents = [];
let students = JSON.parse(localStorage.getItem("class_"+className)) || [];
let current = null;
let muted = localStorage.getItem("muted")==="true";
let pickedStudents = [];
let spells = JSON.parse(localStorage.getItem(className+"_spells")) || [
    {name:"Fireball", cost:1, damage:1},
    {name:"Ice", cost:2, damage:2}
];

function openSpellEditor(){
    renderSpells();
    document.getElementById("overlay").style.display="block";
    document.getElementById("spellEditor").style.display="block";
}

function closeSpellEditor(){
    document.getElementById("spellEditor").style.display="none";
}

function clearSelection(){
    selectedStudents = [];
    render();
}

function renderSpells(){
    const div = document.getElementById("spellList");
    div.innerHTML = "";

    spells.forEach((s,i)=>{
        div.innerHTML += `
        <div style="margin-bottom:10px;">
            Nom: <input value="${s.name}" onchange="spells[${i}].name=this.value"><br>
            Mana: <input type="number" value="${s.cost}" onchange="spells[${i}].cost=parseInt(this.value)"><br>
            Dégâts: <input type="number" value="${s.damage}" onchange="spells[${i}].damage=parseInt(this.value)">
            <button onclick="removeSpell(${i})">❌</button>
        </div>
        `;
    });
}

function addSpell(){
    spells.push({name:"Nouveau", cost:1, damage:1});
    renderSpells();
}

function removeSpell(i){
    spells.splice(i,1);
    renderSpells();
}

function saveSpells(){
    localStorage.setItem(className+"_spells", JSON.stringify(spells));
    alert("Sorts sauvegardés !");
}
/* Ensure new properties exist */
students.forEach((s,i)=>{
    if(s.hearts === undefined) s.hearts = 10;
    if(s.mana === undefined) s.mana = 5;
    if(s.gold === undefined) s.gold = 0;
    if(s.xp === undefined) s.xp = 0;
    if(s.level === undefined) s.level = 1;

    if(s.image === undefined){
    s.image = "";
}
});

function toggleMute(){
    muted = document.getElementById("muteToggle").checked;
    localStorage.setItem("muted", muted);
}


/* ==================== SAVE ==================== */
function saveData(){
    localStorage.setItem("class_"+className, JSON.stringify(students));
}

/* ==================== GRID ==================== */
function updateGrid(){
    const container = document.getElementById("students");

    container.style.gridTemplateColumns =
"repeat(auto-fit, minmax(140px, 1fr))";

container.style.gridAutoRows = "auto";
}

function toggleSelect(i){
    if(selectedStudents.includes(i)){
        selectedStudents = selectedStudents.filter(x => x !== i);
    } else {
        selectedStudents.push(i);
    }

    const card = document.getElementById("card-" + i);
    if(card){
        card.classList.toggle("selected");
    }
}

/* ==================== RENDER ==================== */
function render(){
    const container = document.getElementById("students");
    container.innerHTML = "";

    students.forEach((s,i)=>{

    const imageName = s.image || "";
    const xpPercent = (s.xp % 1000) / 10;

    let rarity = "";

    if(s.level >= 20){
        rarity = "legendary";
    }
    else if(s.level >= 10){
        rarity = "epic";
    }
    else if(s.level >= 5){
        rarity = "rare";
    }

    container.innerHTML += `
<div class="card ${rarity} ${selectedStudents.includes(i) ? "selected" : ""} pop"
     id="card-${i}"
     onclick="openPopup(${i})">

    <input type="checkbox"
        class="selectBox"
        ${selectedStudents.includes(i) ? "checked" : ""}
        onclick="toggleSelect(${i}); event.stopPropagation()">

    <img class="studentPortrait" src="${imageName}">

    <div class="studentName">${s.name}</div>

    <div class="levelBadge">⭐ Niveau ${s.level}</div>

    <div class="xpBar">
        <div class="xpFill" style="width:${xpPercent}%"></div>
    </div>

    <div class="statsCompact">
        <div>❤️ ${s.hearts}</div>
        <div>🔮 ${s.mana}</div>
        <div>🪙 ${s.gold}</div>
    </div>
</div>
`;
    });

    updateGrid();
}
render();
document.getElementById("muteToggle").checked = muted;
const imageInput = document.getElementById("studentImage");

imageInput.addEventListener("change", function(e){

    const file = e.target.files[0];
    if(!file || current === null) return;

   const reader = new FileReader();

reader.onload = function(event){
    // resize + compression simple
    const img = new Image();
    img.src = event.target.result;

    img.onload = function(){
        const canvas = document.createElement("canvas");
        const ctx = canvas.getContext("2d");

        const maxSize = 120;
        canvas.width = maxSize;
        canvas.height = maxSize;

        ctx.drawImage(img, 0, 0, maxSize, maxSize);

        const compressed = canvas.toDataURL("image/jpeg", 0.6);

        students[current].image = compressed;

        saveData();
        render();
    };
};

    reader.readAsDataURL(file);
});
/* ==================== POPUP ==================== */
function openPopup(index){
    current = index;
    const s = students[index];

    studentName.value = s.name;
document.getElementById("previewImage").src = s.image;
    updateLive();

    document.getElementById("card-"+index).style.outline="3px solid orange";

    overlay.style.display="block";
    popup.style.display="block";
}

function updateLive(){
    const s = students[current];
    liveHearts.innerText = s.hearts+"/10";
    liveGold.innerText = s.gold;
    liveMana.innerText = s.mana+"/5";
    liveXP.innerText = s.xp + " / 1000";
}


/* ==================== HEART ANIMATION ==================== */
function heartEffect(index, positive=true){
    const card = document.getElementById("card-"+index);
    const heart = document.createElement("div");
    heart.innerText = positive ? "❤️ +1" : "💔 -1";
    heart.style.position="absolute";
    heart.style.color= positive ? "green":"red";
    heart.style.fontWeight="bold";
    heart.style.top="50%";
    heart.style.left="50%";
    heart.style.transform="translate(-50%,-50%)";
    heart.style.animation="floatUp 1s forwards";
    card.appendChild(heart);
    setTimeout(()=>heart.remove(),1000);
}

function xpEffect(index, amount){
    const card = document.getElementById("card-"+index);
    const xp = document.createElement("div");
    xp.innerText = "⭐ +" + amount;
    xp.style.position="absolute";
    xp.style.color="blue";
    xp.style.fontWeight="bold";
    xp.style.top="60%";
    xp.style.left="50%";
    xp.style.transform="translate(-50%,-50%)";
    xp.style.animation="floatUp 1s forwards";
    card.appendChild(xp);
    setTimeout(()=>xp.remove(),1000);
}


/* Floating animation */
const style=document.createElement("style");
style.innerHTML=`
@keyframes floatUp{
0%{opacity:1;transform:translate(-50%,-50%);}
100%{opacity:0;transform:translate(-50%,-120%);}
}`;
document.head.appendChild(style);

/* ==================== SINGLE EDIT ==================== */
function changeHearts(v){
    let s = students[current];
    let old = s.hearts;
    s.hearts = Math.min(10, Math.max(0,s.hearts+v));
    if(s.hearts !== old) heartEffect(current, v>0);
    updateLive();
}

function changeMana(v){
    let s = students[current];
    s.mana = Math.min(5, Math.max(0,s.mana+v));
    updateLive();
}

function changeGold(){
    let amount = parseInt(goldInput.value)||0;
    let s = students[current];
    s.gold = Math.max(0,s.gold+amount);
    updateLive();
}

/* ==================== QUICK REWARD BUTTONS ==================== */
function quickHeart(index, value){
    let s = students[index];
    let old = s.hearts;
    s.hearts = Math.min(10, Math.max(0, s.hearts + value));
    if(s.hearts !== old) heartEffect(index, value>0);
    saveData();
    render();
}

function quickMana(index, value){
    let s = students[index];
    s.mana = Math.min(5, Math.max(0, s.mana + value));
    saveData();
    render();
}

function quickGold(index, value){
    let s = students[index];
    s.gold = Math.max(0, s.gold + value);
    saveData();
    render();
}

function quickXP(index, amount){
    addXP(amount, index);
    saveData();
    render();
}


/* ==================== XP SYSTEM ==================== */
let levelSound = new Audio("https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3");

function addXP(amount,index){
    let s = students[index];
    s.xp += amount;

    xpEffect(index, amount);

    while(s.xp >= 1000){
        s.xp -= 1000;
        s.level++;

        levelUpEffect(index);
        if(!muted) levelSound.play();
    }
}


function changeXP(){
    let amount = parseInt(document.getElementById("xpInput").value) || 0;
    if(amount <= 0) return;

    addXP(amount, current);
    updateLive();
    saveData();
    render();
}


function levelUpEffect(index){
    const card = document.getElementById("card-"+index);
    card.style.boxShadow="0 0 20px gold";
    card.style.transition="0.3s";

    const banner = document.getElementById("levelBanner");
    banner.style.display="block";

    setTimeout(()=>{
        card.style.boxShadow="0 0 5px rgba(0,0,0,0.2)";
        banner.style.display="none";
    },1500);
}



/* ==================== SAVE ==================== */
function saveAndClose(){
console.log("SAVE CLICKED");
    if(current === null) return;

    const nameInput = document.getElementById("studentName");

    students[current].name = nameInput.value;

    saveData();
    render();
    closeAll(); // IMPORTANT : pas closeAllWithoutSave
}


/* ==================== MULTI SELECT REWARD ==================== */
function bulkReward(){
    let selected = [...document.querySelectorAll(".selectBox:checked")];

    if(selected.length === 0){
        alert("Aucun élève sélectionné");
        return;
    }

    overlay.style.display="block";
    document.getElementById("bulkPopup").style.display="block";
}

function applyBulkReward(){

    if(selectedStudents.length === 0){
        alert("Aucun élève sélectionné");
        return;
    }

    let hearts = parseInt(document.getElementById("bulkHearts").value) || 0;
    let mana   = parseInt(document.getElementById("bulkMana").value) || 0;
    let gold   = parseInt(document.getElementById("bulkGold").value) || 0;
    let xp     = parseInt(document.getElementById("bulkXP").value) || 0;

    selectedStudents.forEach(i=>{
        students[i].hearts = Math.min(10, Math.max(0, students[i].hearts + hearts));
        students[i].mana   = Math.min(5, Math.max(0, students[i].mana + mana));
        students[i].gold   = Math.max(0, students[i].gold + gold);

        if(xp !== 0){
            addXP(xp, i);
        }
    });

    saveData();
    render();

    selectedStudents = []; // reset propre
    closeAll();
}


/* ==================== RESET & DELETE FIX ==================== */
function resetClass(){
    if(confirm("Réinitialiser les statistiques de la classe ?")){
        students.forEach(s=>{
            s.hearts = 10;
            s.mana = 5;
            s.gold = 0;
            s.xp = 0;
            s.level = 1;
        });
        saveData();
        render();

/*Random student picker*/
function pickRandomStudent(){

    if(students.length === 0){
        alert("Aucun élève dans la classe");
        return;
    }

    let available = students.map((s,i)=>i);

    if(document.getElementById("noRepeatToggle").checked){
        available = available.filter(i => !pickedStudents.includes(i));

        if(available.length === 0){
            alert("Tous les élèves ont déjà été choisis !");
            return;
        }
    }

    const index = available[Math.floor(Math.random()*available.length)];

    if(document.getElementById("noRepeatToggle").checked){
        pickedStudents.push(index);
    }

    document.querySelectorAll(".card").forEach(c=>{
        c.style.outline="none";
        c.style.transform="scale(1)";
    });

    const card = document.getElementById("card-"+index);
    card.style.outline="4px solid purple";
    card.style.transform="scale(1.05)";
    card.style.transition="0.3s";

    alert("🎉 Élève sélectionné : " + students[index].name);
}

/*group maker*/
function makeGroups(){

    if(students.length === 0){
        alert("Il n'y a pas d'élèves dans la classe");
        return;
    }

    let groupSize = parseInt(document.getElementById("groupSize").value);
    if(groupSize < 2) groupSize = 2;
    if(groupSize > 6) groupSize = 6;

    let shuffled = [...students]
        .map((s,i)=>({student:s,index:i}))
        .sort(()=>Math.random()-0.5);

    let groups = [];
    let usedIndexes = [];

    for(let i=0; i<shuffled.length; i+=groupSize){
        let group = shuffled.slice(i, i+groupSize);

        // If only one left → FREE student
        if(group.length === 1){
            break;
        }

        group.forEach(member=>{
            usedIndexes.push(member.index);
        });

        groups.push(group);
    }

    // FREE students
    let freeStudents = students
        .map((s,i)=>({student:s,index:i}))
        .filter(s => !usedIndexes.includes(s.index));

    // Clear outlines
    document.querySelectorAll(".card").forEach(c=>c.style.outline="none");

    const colors = ["red","blue","green","orange","purple","brown"];

    groups.forEach((group,gIndex)=>{
        group.forEach(member=>{
            const card = document.getElementById("card-"+member.index);
            card.style.outline="4px solid "+colors[gIndex % colors.length];
        });
    });

    // Build popup content
    let content = "";

    groups.forEach((group,i)=>{
        content += "<strong>Groupe "+(i+1)+"</strong><br>";
        group.forEach(member=>{
            content += "- " + member.student.name + "<br>";
        });
        content += "<br>";
    });

    // SHOW FREE STUDENTS
    if(freeStudents.length > 0){
        content += "<strong>Élève(s) libre(s)</strong><br>";
        freeStudents.forEach(member=>{
            content += "- " + member.student.name + "<br>";
        });
    }

    document.getElementById("groupContent").innerHTML = content;

    overlay.style.display="block";
    document.getElementById("groupPopup").style.display="block";

    window.currentGroups = groups;
}


/*group download*/
function downloadGroups(){

    if(!window.currentGroups) return;

    let text = "";

    window.currentGroups.forEach((group,i)=>{
        text += "Groupe "+(i+1)+"\n";
        group.forEach(member=>{
            text += "- " + member.student.name + "\n";
        });
        text += "\n";
    });

    const blob = new Blob([text], {type:"text/plain"});
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "groupes.txt";
    link.click();
}

// Import class from JSON file
function importClass(event){
    const file = event.target.files[0];
    if(!file) return;

    const reader = new FileReader();
    reader.onload = function(e){
        try {
            const importedStudents = JSON.parse(e.target.result);
            if(!Array.isArray(importedStudents)){
                alert("Format de fichier invalide !");
                return;
            }
            students = importedStudents;

students.forEach((s,i)=>{
    if(s.hearts === undefined) s.hearts = 10;
    if(s.mana === undefined) s.mana = 5;
    if(s.gold === undefined) s.gold = 0;
    if(s.xp === undefined) s.xp = 0;
    if(s.level === undefined) s.level = 1;

    if(s.image === undefined){
    s.image = "";
}
});
            saveData();
            render();

            alert("Classe importée avec succès !");
        } catch(err){
            alert("Erreur lors de la lecture du fichier : " + err);
        }
    };
    reader.readAsText(file);
}

function renameClass(){
    const newName = prompt("Entrez le nouveau nom de la classe :", className);
    if(!newName) return; // canceled or empty

    if(localStorage.getItem("class_" + newName)){
        alert("Une classe avec ce nom existe déjà !");
        return;
    }

    localStorage.setItem("class_" + newName, JSON.stringify(students));
    localStorage.removeItem("class_" + className);
    window.history.replaceState({}, '', "class.html?name=" + encodeURIComponent(newName));
    document.getElementById("classTitle").innerText = newName;

    alert("Classe renommée avec succès !");
}
