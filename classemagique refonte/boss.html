<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Combat du Boss</title>

<style>
body{
    font-family:"Trebuchet MS", serif;
    background:radial-gradient(circle at center, #4a1515, #1a0808);
    color:white;
    text-align:center;
    overflow:hidden;
    margin:0;
}

/* TITRES */

h1,h2{
    margin:5px 0;
    color:#f7e9c0;
    text-shadow:0 0 10px rgba(255,215,0,.4);
}

h1{
    font-size:56px;
    color:gold;

    letter-spacing:3px;

    text-shadow:
        0 0 10px gold,
        0 0 20px gold,
        0 0 40px orange;

    animation:titleGlow 2s infinite alternate;

    margin-top:20px;
}

@keyframes titleGlow{
    from{
        text-shadow:
            0 0 10px gold,
            0 0 20px gold;
    }

    to{
        text-shadow:
            0 0 20px gold,
            0 0 40px orange,
            0 0 60px red;
    }
}

/* IMAGE DU BOSS */

#bossImage{
    width:250px;
    height:250px;
    object-fit:cover;

    border-radius:20px;
    border:4px solid gold;

    margin:20px auto;
    display:block;

    box-shadow:
        0 0 20px gold,
        0 0 40px orange,
        0 0 80px rgba(255,0,0,.4);

    transition:filter .3s, transform .2s;

    animation:
        bossFloat 3s ease-in-out infinite,
        bossGlow 2s ease-in-out infinite alternate;
}

@keyframes bossFloat{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

@keyframes bossGlow{
    from{
        box-shadow:
            0 0 20px gold,
            0 0 40px orange,
            0 0 80px rgba(255,0,0,.3);
    }
    to{
        box-shadow:
            0 0 30px gold,
            0 0 60px orange,
            0 0 120px rgba(255,0,0,.6);
    }
}

/* BOUTONS */

button{
    padding:12px 22px;
    margin:10px;

    cursor:pointer;

    border-radius:10px;
    border:2px solid #d8b35c;

    font-size:16px;
    font-weight:bold;

    background:
        linear-gradient(
            #9a6a3f,
            #6f421f
        );

    color:#f7e9c0;

    transition:.2s;

    box-shadow:
        0 4px 10px rgba(0,0,0,.4);
}

button:hover{
    transform:scale(1.08);

    box-shadow:
        0 0 20px gold,
        0 0 40px rgba(255,215,0,.3);
}

button:active{
    transform:scale(.95);
}

/* COEURS DU BOSS */

#heartsContainer{
    font-size:55px;

    margin:15px 0;

    letter-spacing:8px;

    text-shadow:
        0 0 10px red,
        0 0 20px red,
        0 0 40px crimson;
}

#statusContainer{
    font-size:22px;
    margin-bottom:15px;
    color:#f7e9c0;
}

.victoryText{
    font-size:36px;
    color:gold;

    text-shadow:
        0 0 15px gold,
        0 0 40px orange;

    animation:victoryPulse 1s infinite alternate;
}

/* THINKING */

#thinkingIcon{
    position:fixed;
    top:10px;
    right:10px;
    font-size:30px;
    display:none;
}

/* OVERLAY */

#overlay{
    display:none;
    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

    background:rgba(0,0,0,0.75);

    z-index:4000;
}

/* POPUP ÉLÈVE */

#studentPopup{
    display:none;
    position:fixed;

    top:50%;
    left:50%;
    transform:translate(-50%, -50%);

    width:90%;
    max-width:320px;
    max-height:80vh;

    overflow-y:auto;

    padding:20px;

    background:
        linear-gradient(
            #3a2613,
            #1f140a
        );

    border:3px solid gold;
    border-radius:20px;

    color:#f7e9c0;

    z-index:5000;

    box-shadow:
        0 0 30px rgba(255,215,0,.4),
        0 0 60px rgba(0,0,0,.8);
}

#studentPopup img{
    width:100%;
    max-width:180px;

    border-radius:15px;

    border:3px solid gold;

    box-shadow:
        0 0 15px gold;

    margin-bottom:10px;
}

/* BOUTIQUE DE MANA */

#manaShop{
    display:none;
    position:fixed;

    top:60%;
    left:50%;
    transform:translate(-50%,-50%);

    width:280px;

    padding:20px;

    background:linear-gradient(#10142d,#1b2452);

    border:2px solid cyan;
    border-radius:15px;

    color:white;

    z-index:6000;

    box-shadow:0 0 25px cyan;
}

/* ZONE DE COMBAT */

#fightDiv{
    padding-bottom:320px;
}

/* ANIMATION DE DÉGÂTS */

@keyframes shake{
    0%{transform:translate(0,0);}
    20%{transform:translate(-5px,3px);}
    40%{transform:translate(5px,-3px);}
    60%{transform:translate(-5px,2px);}
    80%{transform:translate(5px,-2px);}
    100%{transform:translate(0,0);}
}

.shake{
    animation:shake .3s;
}

.hit{
    filter:brightness(2) saturate(2) hue-rotate(-20deg);
}

/* MOBILE */

@media(max-width:500px){

    #bossImage{
    width:250px;
    height:250px;
    object-fit:cover;

    border-radius:20px;
    border:4px solid gold;

    margin:20px auto;
    display:block;

    box-shadow:
        0 0 20px gold,
        0 0 40px orange,
        0 0 80px rgba(255,0,0,.4);

    transition:filter .3s, transform .2s;

    animation:
        bossFloat 3s ease-in-out infinite,
        bossGlow 2s ease-in-out infinite alternate;
}

@keyframes bossFloat{
    0%,100%{
        transform:translateY(0px);
    }
    50%{
        transform:translateY(-12px);
    }
}

@keyframes bossGlow{
    from{
        box-shadow:
            0 0 20px gold,
            0 0 40px orange,
            0 0 80px rgba(255,0,0,.3);
    }

    to{
        box-shadow:
            0 0 30px gold,
            0 0 60px orange,
            0 0 120px rgba(255,0,0,.6);
    }
}


@keyframes victoryPulse{
    from{
        transform:scale(1);
    }

    to{
        transform:scale(1.08);
    }
}
}

</style>
</head>

<body>

<h1>Combat du Boss</h1>

<div id="setupDiv">
<h2>Préparez le Boss</h2>

<label>❤️ Vies: <input type="number" id="bossHearts" value="3"></label><br><br>
<label>XP Récompense: <input type="number" id="bossXP" value="150"></label><br><br>
<label>💰 Or Récompense: <input type="number" id="bossGold" value="5"></label><br><br>
<label>🔮 Mana Récompense: <input type="number" id="bossMana" value="0"></label><br><br>
<label>Nombre de mauvaises réponses avant la fuite du boss : <input type="number" id="bossEscape" value="3"></label><br><br>

<button onclick="startFight()">Commencer le combat</button>
</div>


<div id="fightDiv" style="display:none;">

<div id="heartsContainer"></div>
<div id="statusContainer"></div>

<img id="bossImage" src="">

<div>
<button id="goodBtn" onclick="goodAnswer()">Bonne réponse ✅</button>
<button id="wrongBtn" onclick="wrongAnswer()">Mauvaise réponse ❌</button>

<br>

<button onclick="showRandomStudent()">🎲 Élève au hasard</button>
</div>

</div>

<div id="thinkingIcon">💭</div>
<div id="overlay" onclick="closePopup()"></div>

<div id="studentPopup">
    <img id="popupImg">
    <h3 id="popupName"></h3>
    <div id="popupStats"></div>

    <button onclick="openManaShop()">🔮 Utiliser du mana</button>
    <button onclick="changeMana(-1)">➖ Mana -1</button>
    <button onclick="closePopup()">Fermer</button>
</div>


<div id="manaShop">
    <h3>🧙 Sorts</h3>
    <div id="spellContainer"></div>
    <button onclick="closeManaShop()">Fermer</button>
</div>

<script>
let params = new URLSearchParams(window.location.search);
let className = params.get("name") || "Classe";

let raw = JSON.parse(
    localStorage.getItem("class_" + className)
);

let students = [];
const statusContainer = document.getElementById("statusContainer");
const manaShop = document.getElementById("manaShop");
const spellContainer = document.getElementById("spellContainer");
const popupImg = document.getElementById("popupImg");
const popupName = document.getElementById("popupName");
const popupStats = document.getElementById("popupStats");
const overlay = document.getElementById("overlay");
if(Array.isArray(raw)){
    students = raw; // anciennes classes
}
else if(raw){
    students = raw.students || [];
}
let spells = JSON.parse(localStorage.getItem(className + "_spells")) || [];

let boss = {hearts:3,xp:150,gold:5,mana:0,escape:3};
let wrongCount = 0;
let currentStudent = null;
let fightEnded = false;

function shakeBoss(){
    const bossImg = document.getElementById("bossImage");

    bossImg.classList.add("shake", "hit");

    setTimeout(()=>{
        bossImg.classList.remove("shake", "hit");
    }, 300);
}

function startFight(){

    let randomIndex = Math.floor(Math.random()*20)+1;
    document.getElementById("bossImage").src = "boss"+randomIndex+".png";

    boss.hearts = parseInt(bossHearts.value)||3;
    boss.xp = parseInt(bossXP.value)||150;
    boss.gold = parseInt(bossGold.value)||5;
    boss.mana = parseInt(bossMana.value)||0;
    boss.escape = parseInt(bossEscape.value)||3;

    wrongCount = 0;
    fightEnded = false;

    document.getElementById("setupDiv").style.display="none";
    document.getElementById("fightDiv").style.display="block";

    updateBoss();
}



function updateBoss(){
    let c = document.getElementById("heartsContainer");
    c.innerHTML = "";
    for(let i=0;i<boss.hearts;i++) c.innerHTML += "❤️";
}




function showRandomStudent(){
    if(fightEnded){
        alert("Le combat est terminé !");
        return;
    }

    closeAll(); 
    let alive = students.filter(s => (s.hearts || 0) > 0);

    if(alive.length === 0){
        alert("Aucun élève vivant !");
        return;
    }

    let s = alive[Math.floor(Math.random()*alive.length)];
    currentStudent = s;

   

    const img = document.getElementById("popupImg");

if(s.image){
    img.src = s.image;
    img.style.display = "block";
}else{
    img.style.display = "none";
}
    document.getElementById("popupName").innerText = s.name;

    updatePopup();

    

    document.getElementById("overlay").style.display = "block";

    document.getElementById("studentPopup").style.display = "block";
    
}

function updatePopup(){
    if(!currentStudent) return;

    document.getElementById("popupStats").innerHTML =
        "❤️ "+(currentStudent.hearts||0)+"/10<br>"+
        "🪙 "+(currentStudent.gold||0)+"<br>"+
        "🔮 "+(currentStudent.mana||0)+"<br>"+
        "⭐ XP "+(currentStudent.xp||0);
}

function closePopup(){
    document.getElementById("studentPopup").style.display="none";
    document.getElementById("overlay").style.display="none";
    document.getElementById("manaShop").style.display="none";
}


function changeMana(v){
    if(!currentStudent) return;
    currentStudent.mana = Math.max(0,(currentStudent.mana||0)+v);
    updatePopup();
}



function openManaShop(){
    manaShop.style.display="block";
    renderSpellsShop();
}

function closeManaShop(){
    manaShop.style.display="none";
}

function renderSpellsShop(){

    let div = spellContainer;
    div.innerHTML = "";

    spells.forEach(spell=>{
        let btn = document.createElement("button");
        btn.innerText = `${spell.name} (${spell.cost})`;
        btn.onclick = () => useSpell(spell);
        div.appendChild(btn);
        div.appendChild(document.createElement("br"));
    });
}

function useSpell(spell){

    if(!currentStudent || fightEnded) return;

    if((currentStudent.mana||0) < spell.cost){
        alert("Pas assez de mana !");
        return;
    }

    currentStudent.mana -= spell.cost;
    boss.hearts -= spell.damage;

    if(boss.hearts < 0) boss.hearts = 0;

    updateBoss();
    updatePopup();
    closeManaShop();

    if(boss.hearts === 0){
        victory();
    }
}



function goodAnswer(){
    if(fightEnded) return;

    boss.hearts--;
    shakeBoss(); 
    updateBoss();

    if(boss.hearts <= 0){
        victory();
    }
}

function wrongAnswer(){
    if(fightEnded) return;

    wrongCount++;
    if(wrongCount >= boss.escape){
        alert("Le boss s'est enfui !");
        endFight();
    }
}



function victory(){

    fightEnded = true;

    let btn = document.createElement("button");
    btn.innerText = "🎁 Récupérer les récompenses";
    btn.onclick = claimRewards;

    statusContainer.innerHTML =
        '<div class="victoryText">🏆 BOSS VAINCU ! 🏆</div>';

    statusContainer.appendChild(document.createElement("br"));
    statusContainer.appendChild(btn);
}

function claimRewards(){

    let alive = students.filter(s => (s.hearts||0) > 0);

    alive.forEach(s=>{
        s.gold = (s.gold||0) + boss.gold;
        s.mana = (s.mana||0) + boss.mana;
        addXP(s, boss.xp);
    });

    let raw = JSON.parse(
    localStorage.getItem("class_" + className)
);

let icon = "🏫";

if(raw && !Array.isArray(raw)){
    icon = raw.icon || "🏫";
}

localStorage.setItem(
    "class_" + className,
    JSON.stringify({
        icon: icon,
        students: students
    })
);

    alert("Récompenses distribuées !");

   
    window.location.href = "class.html?name=" + encodeURIComponent(className);
}



function endFight(){
    fightEnded = true;
}


function addXP(s, amount){

    s.xp = (s.xp||0) + amount;
    if(!s.level) s.level = 1;

    while(s.xp >= 1000){
        s.xp -= 1000;
        s.level++;
    }
}

function closeAll(){
    document.getElementById("studentPopup").style.display="none";
    document.getElementById("overlay").style.display="none";
    document.getElementById("manaShop").style.display="none";
}
</script>

</body>
</html>
