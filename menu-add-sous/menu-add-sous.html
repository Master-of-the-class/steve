    body {

      margin: 0;

    }

    .container {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 60%;
      max-width: 400px;
    }

    a {
      text-decoration: none;
    }

    button {
      width: 100%;
      padding: 2vh;
      font-size: 3vw;
      cursor: pointer;
      border: none;
      background-color: #007BFF;
      color: white;
      border-radius: 8px;
    }

    button:hover {
      background-color: #0056b3;
    }

    @media (max-width: 600px) {
      button {
        font-size: 6vw;
      }
    }
  </style>
</head>
